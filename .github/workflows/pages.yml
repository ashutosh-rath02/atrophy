name: pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble demo site
        run: |
          mkdir -p _site
          cp dashboard/index.html _site/index.html
          cp dashboard/demo-data.json _site/data.json
          cp dashboard/leaderboard.html _site/leaderboard.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
